.hearts{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:2}
.hf{position:absolute;animation:floatUp 6s linear infinite;opacity:.7}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:.7}100%{transform:translateY(-40px) rotate(20deg);opacity:0}}
.bottom-area{
  position:relative;z-index:3;
  display:flex;flex-direction:column;
  align-items:center;gap:0.8rem;
  width:90%;max-width:380px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(6px);
  border-radius:24px;
  padding:1.4rem 1.8rem 1.6rem;
  box-shadow:0 4px 24px rgba(255,100,150,0.18);
}
.question{
  font-size:1.65rem;font-weight:800;color:#d63070;
  text-align:center;line-height:1.3;
}
.btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
#btn-no{
  background:rgba(255,255,255,.9);color:#999;border:2px solid #ddd;
  border-radius:50px;padding:13px 34px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
#btn-si{
  background:linear-gradient(135deg,#ff6b9d,#ff8fb1);color:white;border:none;
  border-radius:50px;padding:13px 34px;font-size:1.05rem;font-weight:700;
  cursor:pointer;position:fixed;z-index:999;
  box-shadow:0 4px 15px rgba(255,107,157,.45);white-space:nowrap;transition:transform .12s
}
#msg{font-size:.9rem;color:#c0305a;min-height:20px;font-style:italic;text-align:center;}
#fw-screen{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(135deg,#1a0030,#0d0020);
  z-index:9999;align-items:center;justify-content:center;flex-direction:column
}
#fw-screen.show{display:flex}
#fw-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.fw-msg{position:relative;z-index:2;text-align:center;padding:1.5rem}
.fw-msg h1{
  font-size:2.6rem;font-weight:800;color:white;
  text-shadow:0 0 20px rgba(255,255,255,.6),0 0 40px #ff6b9d;
  margin-bottom:.5rem;animation:pulse 1s ease-in-out infinite
}
.fw-msg p{font-size:1.2rem;color:#ffb3d1;margin-bottom:1.5rem}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.fw-msg button{background:white;color:#e0407a;border:none;border-radius:50px;padding:12px 32px;font-size:1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="bg"></div>
  <div class="hearts" id="hearts"></div>
  <div class="bottom-area">
    <div class="question">mi ami da impazzire? 🌸</div>
    <div class="btns">
      <button id="btn-no" onclick="handleNo()">No 😔</button>
    </div>
    <div id="msg"></div>
  </div>
</div>
<div id="fw-screen">
  <canvas id="fw-canvas"></canvas>
  <div class="fw-msg">
    <h1>anche io amore miooo 🎉</h1>
    <p>Sei la cosa più bella della mia vita ❤️</p>
    <button onclick="document.getElementById('fw-screen').classList.remove('show');stopFW()">Chiudi 💕</button>
  </div>
</div>
<script>
(function(){
  var noMsgs=["Dai, riprova! 🥺","Il tasto sbagliato... 😢","Sicuro sicuro? 🐼💔","Ripensaci! 🌸","Non ci credo! 🐼","Mh, proprio no? 😭"];
  var noCount=0;
  var bg=document.getElementById('hearts');
  for(var i=0;i<14;i++){
    var h=document.createElement('div');h.className='hf';
    h.textContent=['♥','♡','💕','💖','💗'][Math.floor(Math.random()*5)];
    h.style.cssText='left:'+Math.random()*100+'%;font-size:'+(10+Math.random()*14)+'px;color:#ff6b9d;animation-delay:'+Math.random()*6+'s;animation-duration:'+(4+Math.random()*4)+'s;';
    bg.appendChild(h);
  }

  var btnSi=document.createElement('button');
  btnSi.id='btn-si';btnSi.textContent='Sì 💖';
  document.body.appendChild(btnSi);

  var startX=window.innerWidth/2+90;
  var startY=window.innerHeight-90;
  btnSi.style.left=startX+'px';btnSi.style.top=startY+'px';

  var running=true,stopCount=0,stopAt=5+Math.floor(Math.random()*5);

  function rp(){
    var m=70;
    return{x:m+Math.random()*(window.innerWidth-m*2),y:m+Math.random()*(window.innerHeight-m*2)};
  }

  function esc(e){
    if(!running)return;stopCount++;
    if(stopCount>=stopAt){
      running=false;
      btnSi.style.transition='all .4s cubic-bezier(.34,1.56,.64,1)';
      btnSi.removeEventListener('mouseenter',esc);
      return;
    }
    var p,a=0,cx=e.clientX||window.innerWidth/2,cy=e.clientY||window.innerHeight/2;
    do{p=rp();a++;}while(a<10&&Math.abs(p.x-cx)<160&&Math.abs(p.y-cy)<160);
    btnSi.style.transition='left .13s ease,top .13s ease';
    btnSi.style.left=p.x+'px';btnSi.style.top=p.y+'px';
  }
  btnSi.addEventListener('mouseenter',esc);
  btnSi.addEventListener('touchstart',function(e){
    e.preventDefault();if(!running)return;stopCount++;
    if(stopCount>=stopAt){running=false;return;}
    var p=rp();btnSi.style.transition='left .18s ease,top .18s ease';
    btnSi.style.left=p.x+'px';btnSi.style.top=p.y+'px';
  });
  btnSi.onclick=function(){document.getElementById('fw-screen').classList.add('show');startFW();};

  window.handleNo=function(){
    document.getElementById('msg').textContent=noMsgs[noCount%noMsgs.length];
    noCount++;btnSi.style.transform='scale('+Math.min(1+noCount*.07,1.5)+')';
  };

  var fwA,parts=[];
  window.startFW=function(){
    var cv=document.getElementById('fw-canvas'),ctx=cv.getContext('2d');
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    var cols=['#ff6b9d','#ffd700','#ff4488','#7fffff','#ffffff','#ffb347','#ff69b4','#87ceeb','#ffc0cb'];
    function launch(){
      var x=100+Math.random()*(cv.width-200),y=80+Math.random()*(cv.height*.5),n=55+Math.floor(Math.random()*40);
      for(var i=0;i<n;i++){var a=(Math.PI*2*i)/n,sp=2+Math.random()*7;parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,color:cols[Math.floor(Math.random()*cols.length)],size:2+Math.random()*4,decay:.012+Math.random()*.018});}
    }
    var last=0;
    function draw(t){
      fwA=requestAnimationFrame(draw);ctx.fillStyle='rgba(15,0,30,.22)';ctx.fillRect(0,0,cv.width,cv.height);
      if(t-last>700){launch();if(Math.random()>.5)launch();last=t;}
      parts=parts.filter(function(p){return p.alpha>.02;});
      for(var i=0;i<parts.length;i++){
        var p=parts[i];ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();
        p.x+=p.vx;p.y+=p.vy;p.vy+=.09;p.vx*=.98;p.alpha-=p.decay;
      }
    }
    requestAnimationFrame(draw);
    for(var i=0;i<3;i++)setTimeout(launch,i*300);
  };
  window.stopFW=function(){if(fwA)cancelAnimationFrame(fwA);parts=[];};
})();
</script>
</body>
</html>
